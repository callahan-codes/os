<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/index.css">
    <link rel="stylesheet" type='text/css' href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
    <link rel="icon" type="image/x-icon" href="./media/images/icon-aboutme.png">
    <title>BC technologies</title>
</head>
<body>

    <main>

        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
        <div class="blob blob4"></div>

        <div class="os-screen">

            <div class="os-app-grid">

                <div id="mainscreen-applications_AboutMe">
                    <img src="./media/images/icon-aboutme.png" draggable="false" alt="About Me graphic"/>
                    <p>Portfolio</p>
                </div>
               
                <div id="mainscreen-applications_SnakeGame">
                    <img src="./media/images/icon-snake.png" draggable="false" alt="Snake.io graphic"/>
                    <p>Snake</p>
                </div>

                <div id="mainscreen-applications_Credits">
                    <img src="./media/images/icon-wordle.png" draggable="false" alt="Wordle graphic"/>
                    <p>Credits</p>
                </div>
            </div>

            <div class="os-footer-menu-display" id="os-footer-menu-display">
                hello
            </div>

            <div id="os-screen-content"></div>

        </div>

        <div class="os-footer">

            <div class="os-footer-toggle_menu">

                <div class="os-footer-burger_menu" id="os-footer-burger_menu">
                    <div class="bar bar1"></div>
                    <div class="bar bar2"></div>
                    <div class="bar bar3"></div>
                </div>
            </div>

            <div class="os-footer-apps" id="os-footer-apps"></div>
        </div>

    </main>

    <audio id="mousedown_click" src="./media/audio/click-down.mp3"></audio>
    <script src="./script/index.js" type="module"></script>

</body>
</html>
